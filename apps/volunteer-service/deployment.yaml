apiVersion: apps/v1
kind: Deployment
metadata:
  name: volunteer-service
  namespace: solidarytech
  labels:
    app: volunteer-service
spec:
  replicas: 2
  selector:
    matchLabels:
      app: volunteer-service
  template:
    metadata:
      labels:
        app: volunteer-service
    spec:
      securityContext:
        runAsNonRoot: true
        runAsUser: 1000
        runAsGroup: 1000
        fsGroup: 1000
        seccompProfile:
          type: RuntimeDefault
      containers:
        - name: volunteer-service
          image: "086038954498.dkr.ecr.us-east-1.amazonaws.com/solidarytech/volunteer-service:sha-f925351"
          imagePullPolicy: Always
          ports:
            - name: http
              containerPort: 8083
          env:
            - name: PORT
              value: "8083"
            - name: AWS_REGION
              value: "us-east-1"
            - name: AWS_DYNAMODB_TABLE
              value: "SolidaryTechVolunteers"
            - name: OTEL_EXPORTER_OTLP_ENDPOINT
              value: "http://otel-collector-opentelemetry-collector.monitoring.svc.cluster.local:4318"
            - name: OTEL_EXPORTER_OTLP_PROTOCOL
              value: "http/protobuf"
            - name: OTEL_SERVICE_NAME
              value: "volunteer-service"
            - name: OTEL_RESOURCE_ATTRIBUTES
              value: "service.namespace=solidarytech,deployment.environment=production"
          # Rightsizing baseado em métricas do Prometheus. Working set observado
          # ~128Mi/pod (pico 128.6Mi) — o request de 128Mi estava COLADO no uso,
          # então foi ELEVADO a 144Mi pra dar headroom real e proteger contra
          # eviction sob pressão de memória do node; limit ajustado a 224Mi.
          # CPU request reduzido a 50m preservando headroom (não ao idle medido).
          resources:
            requests:
              cpu: 50m
              memory: 144Mi
            limits:
              cpu: 250m
              memory: 224Mi
          securityContext:
            allowPrivilegeEscalation: false
            readOnlyRootFilesystem: true
            capabilities:
              drop: ["ALL"]
          volumeMounts:
            - name: tmp
              mountPath: /tmp
          livenessProbe:
            httpGet:
              path: /health
              port: http
            initialDelaySeconds: 5
            periodSeconds: 15
            timeoutSeconds: 3
            failureThreshold: 3
          readinessProbe:
            httpGet:
              path: /health
              port: http
            initialDelaySeconds: 5
            periodSeconds: 10
            timeoutSeconds: 3
            failureThreshold: 3
      volumes:
        - name: tmp
          emptyDir: {}
